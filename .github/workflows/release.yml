name: Release APK

# Builds the Android APK on GitHub's runners (no local build needed) and, when
# triggered by a version tag, publishes it as a GitHub Release asset.
#
# To cut a release:
#   1. Bump `version:` in pubspec.yaml
#   2. git tag v0.1.0 && git push origin v0.1.0
# The tagged run attaches einkreader-v0.1.0.apk to the release at
# https://github.com/xdamman/einkreader/releases/latest
#
# A manual run (workflow_dispatch) only uploads the APK as a build artifact.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Needed for softprops/action-gh-release to create the release.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.2
          cache: true

      - run: flutter pub get

      # Sign releases with a STABLE key stored in GitHub secrets, not the random
      # debug key Gradle generates per-runner. A per-runner key makes every build
      # a different signer, so the device rejects the install as "invalid" (key
      # mismatch with the already-installed copy). The secret holds the project's
      # debug keystore so local and CI builds share one identity. See
      # docs/android-release.md. On a tag build the secret is required.
      - name: Configure release signing keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            if [ "${{ github.ref_type }}" = "tag" ]; then
              echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set — a tagged release must be signed with the stable key. See docs/android-release.md"
              exit 1
            fi
            echo "No keystore secret set; falling back to the debug key for this non-release build."
            exit 0
          fi
          echo "$KEYSTORE_B64" | base64 --decode > android/app/release.keystore
          cat > android/key.properties <<EOF
          storeFile=release.keystore
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF

      # Gate the release on a green analyzer + test suite (the screenshot
      # golden tests are skipped unless --dart-define=screenshots=true).
      - run: flutter analyze
      - run: flutter test

      - run: flutter build apk --release

      # Guard against the "invalid APK on e-ink tablets" regression: old/locked-down
      # firmwares (iFLYTEK AINOTE, etc.) reject v2/v3-only APKs and need the legacy
      # v1 (JAR) signature, which AGP drops by default when minSdk >= 24. See
      # docs/android-release.md. Fail the release if v1 signing ever goes missing.
      - name: Verify APK signature (v1 present + expected key)
        env:
          # SHA-256 of the einkreader signing certificate. The release MUST be
          # signed with this exact key or installs are rejected as "invalid" on
          # devices that already have an older copy. See docs/android-release.md.
          EXPECTED_CERT_SHA256: 8fdf1f1042b9125a15a5e75102a977e1e003dd5772fc1beb3905d82ec9300d5b
        run: |
          apk=build/app/outputs/flutter-apk/app-release.apk
          apksigner=$(find "$ANDROID_SDK_ROOT/build-tools" -name apksigner | sort -V | tail -1)
          # Check at min-sdk 23: v2 signing only exists from API 24, so apksigner
          # reports "v1 scheme: true" only when a real v1 (JAR) signature is present.
          # (At --min-sdk-version 24+ it reports v1 as false even when present, since
          # v2 supersedes it — which is exactly the case old e-ink firmwares can't use.)
          "$apksigner" verify --verbose --print-certs --min-sdk-version 23 "$apk" | tee /tmp/apksig.txt
          if ! grep -q "Verified using v1 scheme (JAR signing): true" /tmp/apksig.txt; then
            echo "::error::APK is missing the v1 (JAR) signature — e-ink firmwares will reject it as invalid. See docs/android-release.md"
            exit 1
          fi
          if ! grep -qi "certificate SHA-256 digest: $EXPECTED_CERT_SHA256" /tmp/apksig.txt; then
            echo "::error::APK is signed with an unexpected key (not $EXPECTED_CERT_SHA256). Devices with an older copy will reject the install. Check the ANDROID_KEYSTORE_* secrets. See docs/android-release.md"
            exit 1
          fi

      # Guard the native-lib packaging: newer Flutter/AGP stores .so uncompressed
      # and page-aligned (extractNativeLibs=false), which the iFLYTEK AINOTE parser
      # rejects as "package appears to be invalid". build.gradle.kts forces
      # useLegacyPackaging=true; fail the release if that regresses. See
      # docs/android-release.md.
      - name: Verify native libs use legacy (compressed) packaging
        run: |
          apk=build/app/outputs/flutter-apk/app-release.apk
          aapt=$(find "$ANDROID_SDK_ROOT/build-tools" -name aapt | sort -V | tail -1)
          extract=$("$aapt" dump xmltree "$apk" AndroidManifest.xml | grep -i extractNativeLibs || true)
          echo "manifest: ${extract:-<extractNativeLibs absent>}"
          # 0xffffffff == true. Absent or 0x0 means the modern layout e-ink installers reject.
          if ! echo "$extract" | grep -q "0xffffffff"; then
            echo "::error::extractNativeLibs is not true — locked-down e-ink installers will reject this APK as invalid. Set useLegacyPackaging=true. See docs/android-release.md"
            exit 1
          fi

      - name: Stage APK with a versioned name
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk \
            "dist/einkreader-${{ github.ref_name }}.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: einkreader-apk
          path: dist/*.apk

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
