name: einkreader
description: A minimal RSS / Twitter / Nostr reader optimized for e-ink tablets.
publish_to: 'none'
version: 0.1.15+15

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  sqflite: ^2.4.1
  path: ^1.9.0
  path_provider: ^2.1.5
  http: ^1.3.0
  xml: ^6.5.0
  html: ^0.15.5
  html2md: ^1.3.2
  flutter_web_auth_2: ^4.1.0
  flutter_secure_storage: ^9.2.4
  web_socket_channel: ^3.0.2
  crypto: ^3.0.6
  shared_preferences: ^2.5.2
  url_launcher: ^6.3.1
  package_info_plus: ^8.0.0
  open_filex: ^4.5.0
  archive: ^4.0.0
  file_picker: ^8.1.0
  intl: ^0.20.2
  # Decode/resize downloaded images for offline storage.
  image: ^4.3.0
  # Native share sheet for sharing a highlight.
  share_plus: ^10.1.4
  # Request "All files access" so the archive can live in a user-chosen folder.
  permission_handler: ^12.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  sqflite_common_ffi: ^2.3.4

flutter:
  uses-material-design: true
